services:
  arclight:
    image: eclipse-temurin:21-jre
    container_name: horizonrealm-arclight
    working_dir: /data
    command: ["/bin/bash", "./scripts/start.sh"]
    ports:
      - "25565:25565"
    volumes:
      - ./server-root:/data/server-root
      - ./plugins-configs:/data/plugins-configs
      - ./mods:/data/mods
      - ./resource-pack:/data/resource-pack
      - ./scripts:/data/scripts
    environment:
      TZ: UTC
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ${MARIADB_DATABASE:-horizonrealm}
      MARIADB_USER: ${MARIADB_USER:-horizonrealm}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set_in_environment_or_.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JVM_XMS: ${JVM_XMS:-12G}
      JVM_XMX: ${JVM_XMX:-12G}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: horizonrealm-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set_in_environment_or_.env}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-horizonrealm}
      MARIADB_USER: ${MARIADB_USER:-horizonrealm}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set_in_environment_or_.env}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: horizonrealm-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: horizonrealm-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  mariadb-data:
  redis-data:
