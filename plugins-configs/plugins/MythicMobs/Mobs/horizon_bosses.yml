ShadowKnight_Boss:
  Type: ZOMBIE
  Display: '&5&lShadow Knight'
  Health: 1000
  Damage: 25
  Armor: 10
  Faction: Undead
  Equipment:
  - NETHERITE_SWORD HAND
  - NETHERITE_CHESTPLATE CHEST
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.3
    PreventOtherDrops: true
    KnockbackResistance: 0.8
  Skills:
  - message{m="&5Shadow Knight&8: &cYour souls belong to the Horizon!"} @PlayersInRadius{r=20} ~onCombat
  - effect:particles{particle=soul_fire_flame;amount=50;hS=1;vS=2;speed=0} @Self ~onTimer:20
  # Ready to hook into ModelEngine for custom attack animations
  Drops:
  - horizon_shards 1-3 100%
  - mmoitems{type=sword;id=SHADOW_BLADE} 1 10%
